# bundle.toml — project manifest for the bundle tool.
# Commit this file to version control.
# The generated bundle.lock file can also be committed for reproducible builds.

[server]
# Command used by `bundle run` to start the Minecraft server.
run = ["java", "-Xmx4G", "-jar", "server.jar", "nogui"]

[bundles]
# Map bundle names to OCI image references (tag form).
# Run `bundle pull` to resolve these tags to digests and write bundle.lock.
#
# example = "ghcr.io/someauthor/example-bundle:latest"
