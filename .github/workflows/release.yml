name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release - ${{ matrix.platform.os-name }}
    strategy:
      matrix:
        platform:
          - os-name: Linux-x86_64
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-musl

          - os-name: Linux-aarch64
            runs-on: ubuntu-latest
            target: aarch64-unknown-linux-musl

          - os-name: Windows-x86_64
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc

          - os-name: macOS-x86_64
            runs-on: macOS-latest
            target: x86_64-apple-darwin

          - os-name: macOS-arm64
            runs-on: macOS-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit
      - name: Set crate version from tag
        shell: bash
        run: cargo set-version "${GITHUB_REF_NAME#v}"
      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: "--release"
          strip: true
      - name: Upload binary artifact for Docker build
        if: matrix.platform.target == 'x86_64-unknown-linux-musl' || matrix.platform.target == 'aarch64-unknown-linux-musl'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform.target }}
          path: target/${{ matrix.platform.target }}/release/bundle
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
      - name: Publish artifacts and release
        uses: houseabsolute/actions-rust-release@v0
        with:
          executable-name: bundle
          target: ${{ matrix.platform.target }}
          changes-file: CHANGELOG.md
          archive-name: bundle-${{ matrix.platform.target }}
          action-gh-release-parameters: |
            {
              "prerelease": ${{ contains(github.ref_name, 'rc') }}
            }

  build-docker-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: release
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        env:
          # Required for GHCR multi-arch images to display annotations in the UI
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Download bundle x64 musl executable
        uses: actions/download-artifact@v4
        with:
          name: bundle-x86_64-unknown-linux-musl

      - name: Rename bundle x64 musl executable
        run: mv bundle bundle-amd64

      - name: Download bundle ARM64 musl executable
        uses: actions/download-artifact@v4
        with:
          name: bundle-aarch64-unknown-linux-musl

      - name: Rename bundle ARM64 musl executable
        run: mv bundle bundle-arm64

      - name: Login to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get build timestamp
        id: date
        run: echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            BUILD_DATE=${{ steps.date.outputs.date }}
            GIT_REVISION=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}
